<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Indonesia Regions</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section id="login-view" class="auth-panel">
        <div>
          <p class="eyebrow">Indonesia Regions</p>
          <h1>Sign in</h1>
        </div>
        <form id="login-form" class="form-grid">
          <label>
            Email
            <input id="email" name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input id="password" name="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">Sign in</button>
          <p id="login-error" class="error-message" hidden></p>
        </form>
      </section>

      <section id="regions-view" class="regions-view" hidden>
        <header class="topbar">
          <div>
            <p class="eyebrow">Indonesia Regions</p>
            <h1>Administrative Data</h1>
          </div>
          <div class="session-actions">
            <a href="/docs">API docs</a>
            <span id="session-email"></span>
            <button id="logout-button" type="button">Sign out</button>
          </div>
        </header>

        <section class="selector-grid">
          <label>
            Province
            <select id="province-select"></select>
          </label>
          <label>
            City / Regency
            <select id="city-select"></select>
          </label>
          <label>
            District
            <select id="district-select"></select>
          </label>
        </section>

        <section class="admin-panel">
          <div>
            <p class="eyebrow">Admin</p>
            <h2>Regenerate region data</h2>
            <p class="muted-text">Regenerates provinces, regencies, districts, and villages through the protected server route.</p>
          </div>
          <form id="regenerate-form" class="admin-grid">
            <label>
              Admin token
              <input id="admin-token" name="admin-token" type="password" autocomplete="off" placeholder="ADMIN_API_TOKEN" required>
            </label>
            <label>
              Province codes
              <input id="province-codes" name="province-codes" type="text" inputmode="numeric" placeholder="31,32">
            </label>
            <label>
              Concurrency
              <input id="regen-concurrency" name="regen-concurrency" type="number" min="1" max="16" value="8">
            </label>
            <label class="checkbox-row">
              <input id="regen-all" name="regen-all" type="checkbox">
              Regenerate all provinces
            </label>
            <button id="regenerate-button" type="submit">Regenerate provinces, regencies, districts & villages</button>
          </form>
        </section>

        <section class="data-panel">
          <div class="panel-header">
            <h2>Villages</h2>
            <span id="village-count">0 records</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Code</th>
                  <th>Name</th>
                </tr>
              </thead>
              <tbody id="villages-body"></tbody>
            </table>
          </div>
        </section>
        <p id="app-error" class="error-message" hidden></p>
      </section>
    </main>
    <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="false"></div>
    <script src="/app.js"></script>
  </body>
</html>
